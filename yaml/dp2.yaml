apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2-dp
  labels:
    app: app2
spec:
  selector:
    matchLabels:
      app: app2
  replicas: 3
  template:
    metadata:
      labels:
        app: app2
    spec:
      imagePullSecrets:
      - name: ocirsecret
      containers:
      - name: app2
        image: ord.ocir.io/axcxnpccpk4b/fbasso-app2:latest
        ports:
        - containerPort: 80
